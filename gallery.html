
<!DOCTYPE html>

<title>Gallery | Laxmi Abha Eye Care Wellness Center</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f8fb;
}

/* Header */

header{
    background:#0077b6;
    color:white;
    text-align:center;
    padding:20px;
}

header h1{
    margin-bottom:10px;
}

/* Navigation */

nav{
    background:#023e8a;
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
}

nav a{
    color:white;
    text-decoration:none;
    padding:15px 25px;
    transition:0.3s;
}

nav a:hover{
    background:#0077b6;
}

/* Hero */

.hero{
    background:#ff8c00;
    color:white;
    text-align:center;
    padding:80px 20px;
}

.hero h1{
    font-size:42px;
    margin-bottom:15px;
}

.hero p{
    font-size:20px;
}

/* Gallery */

.gallery{
    width:90%;
    max-width:1200px;
    margin:50px auto;
}

.gallery h2{
    text-align:center;
    color:#0077b6;
    margin-bottom:25px;
}

/* Photo Gallery */

.photo-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.photo-grid img{
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
    transition:0.3s;
}

.photo-grid img:hover{
    transform:scale(1.05);
}

/* Video Gallery */

.video-grid{
    display:flex;
    justify-content:center;
    margin-top:20px;
}

.video-grid video{
    width:300px;
    height:533px;
    object-fit:cover;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,.25);
}

/* Footer */

footer{
    background:#023e8a;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:50px;
}

</style>

</head>
