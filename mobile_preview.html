<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Preview - Laxmi Abha Eye Care</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; letter-spacing: 0; }
body {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
    background: #f4f8fb;
    color: #16323f;
}
.preview-shell {
    width: min(100%, 440px);
}
.preview-title {
    margin-bottom: 16px;
    text-align: center;
}
.preview-title h1 {
    font-size: 24px;
    color: #023e8a;
    margin-bottom: 6px;
}
.preview-title p {
    color: #5f7580;
    font-size: 15px;
}
.phone {
    width: min(100%, 390px);
    height: min(844px, calc(100vh - 128px));
    min-height: 620px;
    margin: 0 auto;
    padding: 12px;
    border-radius: 34px;
    background: #111827;
    box-shadow: 0 24px 60px rgba(2, 62, 138, .25);
}
.screen {
    width: 100%;
    height: 100%;
    overflow: hidden;
    border-radius: 24px;
    background: white;
}
iframe {
    width: 100%;
    height: 100%;
    border: 0;
}
@media (max-width: 460px) {
    body { padding: 0; background: #111827; }
    .preview-title { display: none; }
    .preview-shell, .phone, .screen { width: 100%; height: 100vh; min-height: 100vh; border-radius: 0; padding: 0; }
}
</style>
</head>
<body>
    <main class="preview-shell">
        <div class="preview-title">
            <h1>Mobile Preview</h1>
            <p>Patient registration shown inside a phone-sized screen.</p>
        </div>
        <div class="phone">
            <div class="screen">
                <iframe src="patient_registration.html" title="Mobile patient registration preview"></iframe>
            </div>
        </div>
    </main>
</body>
</html>
